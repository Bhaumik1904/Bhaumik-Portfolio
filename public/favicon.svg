<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded square — matches site's dark card tone -->
  <rect width="32" height="32" rx="7" fill="#1D1D1F"/>

  <!-- <B/> in monospace — angle brackets in blue, B in white -->
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
    font-size="13"
    font-weight="700"
  >
    <tspan fill="#0071E3">&lt;</tspan><tspan fill="#FFFFFF">B</tspan><tspan fill="#0071E3">/&gt;</tspan>
  </text>
</svg>